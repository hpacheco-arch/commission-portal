<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Commission Portal Finder</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,sans-serif;background:#0f172a;min-height:100vh;padding:24px;color:#e2e8f0}
  h1{font-size:26px;font-weight:800;color:#38bdf8}
  p.sub{color:#94a3b8;margin-top:6px;font-size:14px}
  .center{text-align:center}
  .wrap{max-width:700px;margin:0 auto}
  .header{text-align:center;margin-bottom:32px}
  label.lbl{font-size:12px;color:#94a3b8;display:block;margin-bottom:6px;font-weight:600;letter-spacing:1px}
  select{width:100%;padding:12px 16px;border-radius:10px;background:#1e293b;border:1px solid #334155;color:#e2e8f0;font-size:15px;margin-bottom:20px;outline:none}
  select:focus{border-color:#38bdf8}
  .addons{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
  .addon-btn{padding:8px 14px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
  .addon-btn.active{border-color:#38bdf8;background:#0c4a6e;color:#38bdf8}
  .card{background:#1e293b;border-radius:14px;padding:20px;border:1px solid #334155;margin-bottom:16px}
  .section-title{font-size:12px;color:#94a3b8;margin-bottom:12px;font-weight:700;letter-spacing:1px}
  .best-banner{background:#064e3b;border:1px solid #10b981;border-radius:14px;padding:18px 20px;margin-bottom:16px;display:flex;align-items:center;gap:14px}
  .best-banner .icon{font-size:32px}
  .best-tag{font-size:11px;color:#6ee7b7;font-weight:700;letter-spacing:1px}
  .best-name{font-size:17px;font-weight:800;color:#10b981}
  .best-vals{display:flex;gap:24px;margin-top:6px}
  .best-val span.num{font-size:24px;font-weight:800;color:#fff}
  .best-val span.unit{font-size:12px;color:#6ee7b7;margin-left:6px}
  .best-val span.unit.pts{color:#fcd34d}
  .grid3{display:grid;grid-template-columns:1fr 120px 110px;gap:8px}
  .col-hdr{font-size:11px;color:#64748b;font-weight:700}
  .col-hdr.r{text-align:right}
  .portal-row{display:grid;grid-template-columns:1fr 120px 110px;gap:8px;padding:12px 10px;border-radius:9px;margin-bottom:6px}
  .portal-row.best{background:#1a3a2a;border:1px solid #10b981}
  .portal-row.worst{background:#2a1a1a;border:1px solid #ef4444}
  .portal-row.neutral{background:#0f172a;border:1px solid #1e293b}
  .pname{font-size:13px}
  .pname.best{color:#10b981;font-weight:700}
  .pname.worst{color:#f87171}
  .pname.neutral{color:#cbd5e1}
  .pcomm{font-size:15px;font-weight:700;text-align:right}
  .pcomm.best{color:#10b981}
  .pcomm.worst{color:#f87171}
  .pcomm.neutral{color:#94a3b8}
  .psp{font-size:15px;font-weight:700;text-align:right}
  .psp.best{color:#fbbf24}
  .psp.worst{color:#f87171}
  .psp.neutral{color:#94a3b8}
  .loss-card{background:#1e293b;border-radius:14px;padding:20px;border:1px solid #f59e0b;margin-bottom:16px}
  .loss-title{font-size:12px;color:#f59e0b;margin-bottom:14px;font-weight:700;letter-spacing:1px}
  .loss-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .loss-box{background:#2d1f07;border-radius:10px;padding:14px 16px;border:1px solid #92400e}
  .loss-box-title{font-size:11px;color:#fbbf24;font-weight:700;margin-bottom:4px}
  .loss-num{font-size:28px;font-weight:800;color:#f87171}
  .loss-sub{font-size:12px;color:#94a3b8;margin-top:4px}
  .monthly{margin-top:14px;padding:12px 14px;background:#0f172a;border-radius:10px;border:1px solid #334155}
  .monthly-title{font-size:11px;color:#94a3b8;font-weight:700;margin-bottom:10px;letter-spacing:1px}
  .monthly-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .monthly-cell{text-align:center;padding:10px 6px;background:#1e293b;border-radius:8px}
  .monthly-label{font-size:11px;color:#64748b;margin-bottom:4px}
  .monthly-comm{font-size:16px;font-weight:700;color:#f87171}
  .monthly-pts{font-size:12px;color:#f97316}
  .breakdown-row{display:grid;grid-template-columns:1fr 90px 90px;gap:8px;padding:8px 0;border-bottom:1px solid #334155}
  .breakdown-row.total{border-bottom:none;padding-top:10px}
  .bitem{font-size:13px;color:#cbd5e1}
  .bcomm{font-size:13px;color:#38bdf8;text-align:right}
  .bsp{font-size:13px;color:#fbbf24;text-align:right}
  .bitem.total{font-size:14px;color:#fff;font-weight:700}
  .bcomm.total{font-size:14px;color:#10b981;font-weight:700;text-align:right}
  .bsp.total{font-size:14px;color:#fbbf24;font-weight:700;text-align:right}
  .note{padding:12px 16px;background:#1c1917;border-radius:10px;border:1px solid #78350f;font-size:13px;color:#fbbf24;margin-bottom:16px}
  .empty{text-align:center;padding:40px 20px;color:#475569}
  .empty .icon{font-size:48px;margin-bottom:12px}
  .clear-wrap{text-align:center;margin-top:24px;margin-bottom:12px}
  .clear-btn{padding:12px 32px;border-radius:10px;border:1px solid #ef4444;background:transparent;color:#ef4444;cursor:pointer;font-size:15px;font-weight:700;letter-spacing:.5px;transition:all .2s}
  .clear-btn:hover{background:#ef4444;color:#fff}
  .hdr-row{padding:6px 10px;margin-bottom:4px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>💰 Commission Portal Finder</h1>
    <p class="sub">Select provider & package to find the best portal</p>
  </div>

  <label class="lbl">SELECT PROVIDER</label>
  <select id="providerSel" onchange="onProviderChange()">
    <option value="">-- Choose a Provider --</option>
  </select>

  <label class="lbl" id="tierLbl" style="display:none">SELECT INTERNET TIER</label>
  <select id="tierSel" style="display:none" onchange="onTierChange()">
    <option value="">-- Choose a Tier --</option>
  </select>

  <div id="addonsSection" style="display:none">
    <label class="lbl">ADD-ONS (optional)</label>
    <div class="addons" id="addonsContainer"></div>
  </div>

  <div id="results" style="display:none"></div>
  <div id="clearWrap" style="display:none" class="clear-wrap">
    <button class="clear-btn" onclick="clearAll()">🔄 Clear All & Start Over</button>
  </div>

  <div class="empty" id="emptyState">
    <div class="icon">📡</div>
    <p>Select a provider above to see commission details</p>
  </div>
</div>

  addons:{"Phone (DSI)":{ibex:2,ibex_sp:3},"Whole Home Wifi":{ibex:1,ibex_sp:2}}},

  note:"All video and mobile sales must be tied to an Internet sale"},

  "Quantum Fiber":{internet:[
    {n:"500 Mbps",quantum:4,quantum_sp:14},{n:"1 Gig",quantum:5,quantum_sp:17},{n:"2 Gig",quantum:7,quantum_sp:17}],addons:{}},

  addons:{"Clearlink Transfer Sale":{concert:3,concert_sp:4}}},

    {n:"Fiber 5 Gig",dsi:8,dsi_sp:24},{n:"Fiber 10 Gig",dsi:10,dsi_sp:28}],addons:{}}
};

let selAddons = [];

// Populate provider dropdown
const ps = document.getElementById('providerSel');
Object.keys(D).sort().forEach(p => {
  const o = document.createElement('option');
  o.value = p; o.textContent = p;
  ps.appendChild(o);
});

function onProviderChange() {
  const p = ps.value;
  selAddons = [];
  const ts = document.getElementById('tierSel');
  const tl = document.getElementById('tierLbl');
  const as = document.getElementById('addonsSection');
  const ac = document.getElementById('addonsContainer');
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  document.getElementById('clearWrap').style.display = p ? 'block' : 'none';
  document.getElementById('emptyState').style.display = p ? 'none' : 'block';

  if (!p) { ts.style.display='none'; tl.style.display='none'; as.style.display='none'; return; }

  const prov = D[p];
  ts.innerHTML = '<option value="">-- Choose a Tier --</option>';
  prov.internet.forEach(t => {
    const o = document.createElement('option'); o.value = t.n; o.textContent = t.n; ts.appendChild(o);
  });
  ts.style.display = 'block'; tl.style.display = 'block';

  ac.innerHTML = '';
  const addKeys = Object.keys(prov.addons);
  if (addKeys.length) {
    addKeys.forEach(a => {
      const btn = document.createElement('button');
      btn.className = 'addon-btn'; btn.textContent = a;
      btn.onclick = () => {
        if (selAddons.includes(a)) selAddons = selAddons.filter(x=>x!==a);
        else selAddons.push(a);
        btn.classList.toggle('active', selAddons.includes(a));
        render();
      };
      ac.appendChild(btn);
    });
    as.style.display = 'block';
  } else { as.style.display = 'none'; }
  render();
}

function onTierChange() { render(); }

function render() {
  const p = document.getElementById('providerSel').value;
  const tier = document.getElementById('tierSel').value;
  const res = document.getElementById('results');
  if (!p || !tier) { res.style.display='none'; res.innerHTML=''; return; }

  const prov = D[p];
  const tierObj = prov.internet.find(i => i.n === tier);
  if (!tierObj) return;

  // Calc totals
  const totals = {};
  KEYS.forEach(k => {
    if (tierObj[k] == null) return;
    let comm = tierObj[k], sp = tierObj[k+'_sp']||0;
    selAddons.forEach(a => {
      const ao = prov.addons[a];
      if (ao && ao[k] != null) { comm += ao[k]; sp += ao[k+'_sp']||0; }
    });
    totals[k] = {comm, sp};
  });

  const entries = Object.entries(totals);
  let bestK=null, bestC=-1, bestS=-1;
  entries.forEach(([k,v]) => {
    if (v.comm > bestC || (v.comm===bestC && v.sp>bestS)) { bestC=v.comm; bestS=v.sp; bestK=k; }
  });
  let worstK=null, worstC=Infinity, worstS=Infinity;
  if (entries.length>1) entries.forEach(([k,v]) => { if(v.comm<worstC){worstC=v.comm;worstS=v.sp;worstK=k;} });
  const lostC = (bestK&&worstK&&bestK!==worstK) ? bestC-worstC : 0;
  const lostS = (bestK&&worstK&&bestK!==worstK) ? bestS-worstS : 0;

  let html = '';

  // Best banner
  html += `<div class="best-banner">
    <div class="icon">🏆</div>
    <div style="flex:1">
      <div class="best-tag">BEST PORTAL TO USE</div>
      <div class="best-name">${PL[bestK]}</div>
      <div class="best-vals">
        <div class="best-val"><span class="num">$${bestC.toFixed(2)}</span><span class="unit">commission</span></div>
        <div class="best-val"><span class="num" style="color:#fbbf24">${bestS}</span><span class="unit pts">sales points</span></div>
      </div>
    </div>
  </div>`;

  // Comparison table
  html += `<div class="card">
    <div class="section-title">PORTAL COMPARISON</div>
    <div class="grid3 hdr-row">
      <span class="col-hdr">PORTAL</span>
      <span class="col-hdr r">COMMISSION</span>
      <span class="col-hdr r">SALES PTS</span>
    </div>`;
  entries.forEach(([k,v]) => {
    const isBest = k===bestK, isWorst = k===worstK && entries.length>1;
    const cls = isBest?'best':isWorst?'worst':'neutral';
    const icon = isBest?'✅ ':isWorst?'❌ ':'';
    html += `<div class="portal-row ${cls}">
      <span class="pname ${cls}">${icon}${PL[k]}</span>
      <span class="pcomm ${cls}">$${v.comm.toFixed(2)}</span>
      <span class="psp ${cls}">⭐ ${v.sp}</span>
    </div>`;
  });
  html += `</div>`;

  // Loss card
  if (entries.length>1 && lostC>0) {
    html += `<div class="loss-card">
      <div class="loss-title">⚠️ WHAT YOU LOSE USING THE WRONG PORTAL</div>
      <div class="loss-grid">
        <div class="loss-box">
          <div class="loss-box-title">💸 LOST COMMISSION</div>
          <div class="loss-num">-$${lostC.toFixed(2)}</div>
          <div class="loss-sub">per sale using ${PL[worstK]}</div>
        </div>
        <div class="loss-box">
          <div class="loss-box-title">⭐ LOST SALES POINTS</div>
          <div class="loss-num">-${lostS} pts</div>
          <div class="loss-sub">per sale using ${PL[worstK]}</div>
        </div>
      </div>
      <div class="monthly">
        <div class="monthly-title">📊 MONTHLY IMPACT (if using wrong portal)</div>
        <div class="monthly-grid">
          ${[5,10,20].map(n=>`<div class="monthly-cell">
            <div class="monthly-label">${n} sales/mo</div>
            <div class="monthly-comm">-$${(lostC*n).toFixed(2)}</div>
            <div class="monthly-pts">-${lostS*n} pts</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  }

  // Breakdown
  html += `<div class="card">
    <div class="section-title">BREAKDOWN (BEST PORTAL)</div>
    <div style="display:grid;grid-template-columns:1fr 90px 90px;gap:8px;padding:4px 0 8px">
      <span style="font-size:11px;color:#64748b;font-weight:700">ITEM</span>
      <span style="font-size:11px;color:#64748b;font-weight:700;text-align:right">COMM.</span>
      <span style="font-size:11px;color:#64748b;font-weight:700;text-align:right">PTS</span>
    </div>
    <div class="breakdown-row">
      <span class="bitem">🌐 Internet (${tier})</span>
      <span class="bcomm">$${(tierObj[bestK]||0).toFixed(2)}</span>
      <span class="bsp">⭐ ${tierObj[bestK+'_sp']||0}</span>
    </div>`;
  selAddons.forEach(a => {
    const ao = prov.addons[a];
    const v = ao?(ao[bestK]??0):0;
    const s = ao?(ao[bestK+'_sp']??0):0;
    html += `<div class="breakdown-row">
      <span class="bitem">➕ ${a}</span>
      <span class="bcomm">$${v.toFixed(2)}</span>
      <span class="bsp">⭐ ${s}</span>
    </div>`;
  });
  html += `<div class="breakdown-row total">
    <span class="bitem total">TOTAL</span>
    <span class="bcomm total">$${bestC.toFixed(2)}</span>
    <span class="bsp total">⭐ ${bestS}</span>
  </div></div>`;

  if (prov.note) html += `<div class="note">⚠️ ${prov.note}</div>`;

  res.innerHTML = html;
  res.style.display = 'block';
}

function clearAll() {
  document.getElementById('providerSel').value = '';
  document.getElementById('tierSel').style.display = 'none';
  document.getElementById('tierLbl').style.display = 'none';
  document.getElementById('addonsSection').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  document.getElementById('clearWrap').style.display = 'none';
  document.getElementById('emptyState').style.display = 'block';
  selAddons = [];
}
</script>
</body>
</html>
